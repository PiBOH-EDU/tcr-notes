name: Build APK Android

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        run: npm run build

      - name: Install Capacitor
        run: |
          npm install @capacitor/core @capacitor/android @capacitor/cli @capacitor/browser

      - name: Add Android platform
        run: npx cap add android

      - name: Copy custom app icons
        run: cp -r android-assets/* android/app/src/main/res/

      - name: Sync Capacitor
        run: npx cap sync

      - name: Build debug APK
        run: |
          cd android
          ./gradlew assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: tcr-notes-apk-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk

      - name: Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: android/app/build/outputs/logs/
