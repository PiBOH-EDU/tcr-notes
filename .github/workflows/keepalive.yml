name: Keep Supabase Alive

on:
  schedule:
    - cron: '0 0 * * *'  # ogni giorno a mezzanotte UTC
  workflow_dispatch:      # permette di lanciarlo manualmente

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase
        run: |
          curl -s "${{ secrets.VITE_SUPABASE_URL }}/rest/v1/titles?select=id&limit=1" \
            -H "apikey: ${{ secrets.VITE_SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.VITE_SUPABASE_ANON_KEY }}"
