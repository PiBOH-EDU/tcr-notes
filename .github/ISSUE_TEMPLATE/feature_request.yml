name: 🚀 Richiesta di Funzionalità
description: Hai un'idea? Proponila!
title: "[Feat]: "
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        ### 💡 Feature Proposal
        Aiuta a migliorare tcr-notes.

  - type: dropdown
    id: category
    attributes:
      label: 🏷️ Categoria
      options:
        - ✨ Nuova Funzione
        - 🎨 UI / Design Improvement
        - ⚡ Performance / Ottimizzazione
        - 📱 Mobile / Responsive
        - 🌐 Traduzione / Localizzazione
        - 🔧 Altro
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: 📝 Cosa
      description: Descrivi in maniera dettagliata la tua idea. Come dovrebbe funzionare?
      placeholder: "Mi piacerebbe vedere..."
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: 🤝 Cosa dovrebbe risolvere/aggiungere/migliorare?
      description: Perché questa feature è necessaria? Cosa sistemerebbe?
      placeholder: "Attualmente è difficile..."
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: 🎨 Mockups / Screenshot / Extra
      description: Allega immagini o schizzi se li hai!
